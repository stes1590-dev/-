<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的遊戲收藏館</title>
  <style>
    /* 全局樣式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: background-image 1.5s ease-in-out;
    }

    /* 背景覆蓋層 */
    #bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: opacity 1.5s ease-in-out;
      opacity: 1;
    }

    /* 主卡片 */
    .app-card {
      max-width: 850px; 
      width: 100%;
      background: rgba(22, 28, 46, 0.78);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 30px 24px 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 215, 100, 0.15);
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 215, 100, 0.2);
    }

    /* 頁面容器 */
    .page {
      display: none;
      flex-direction: column;
      gap: 22px;
      animation: fadeIn 0.3s ease;
    }

    .page.active {
      display: flex;
    }

    @keyframes fadeIn {
      0% { opacity: 0.5; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* 標題區 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      border-bottom: 2px solid rgba(255, 215, 100, 0.25);
      padding-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f7d875, #f5b342);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1::before {
      content: "🎮";
      font-size: 2rem;
      filter: drop-shadow(0 0 6px #f5b342);
    }

    .back-btn {
      background: rgba(255, 215, 100, 0.12);
      border: 1px solid rgba(255, 215, 100, 0.35);
      color: #f5d98f;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .back-btn:hover {
      background: rgba(255, 215, 100, 0.25);
      border-color: #f5b342;
      color: #fff3d1;
      transform: scale(1.02);
    }

    /* 首頁按鈕網格 */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      margin-top: 8px;
    }

    .game-btn {
      background: rgba(40, 48, 72, 0.7);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 0;
      min-height: 180px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .game-btn img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .game-btn span {
      padding: 12px;
      text-align: center;
      font-weight: 600;
      color: #d6dcec;
    }
    
    .game-btn:hover {
      transform: translateY(-8px) scale(1.06);
      background: rgba(65, 78, 115, 0.8);
      border-color: #f5b342;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 12px rgba(245, 179, 66, 0.3);
      color: #fff8e7;
    }

    /* 詳細頁面主容器 - 左右並排佈局 */
    .detail-content {
      background: rgba(12, 16, 28, 0.6);
      border-radius: 32px;
      padding: 24px;
      border: 1px solid rgba(255, 215, 100, 0.15);
      backdrop-filter: blur(4px);
      margin-top: 6px;
      display: flex;
      gap: 24px; 
      align-items: flex-start;
    }

    /* 📸 獨立的媒體展示專區 (包含主圖與縮圖) */
    .detail-media-zone {
      flex: 1.3; 
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .detail-media-zone .game-image-main {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 20px;
      border: 1px solid rgba(255, 215, 100, 0.25);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
      display: block;
      cursor: zoom-in; /* 滑鼠移上去顯示放大鏡提示 */
      transition: all 0.2s ease;
    }

    .detail-media-zone .game-image-main:hover {
      border-color: #f5b342;
      transform: scale(1.01);
    }

    /* 🖼️ 我的截圖相簿網格區 */
    .my-screenshots-title {
      font-size: 0.85rem;
      color: #f7d875;
      margin-top: 4px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .screenshots-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); 
      gap: 8px;
    }

    .screenshots-grid img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .screenshots-grid img:hover {
      border-color: #f5b342;
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    /* 📝 右側的文字介紹專區 */
    .detail-info-zone {
      flex: 1.7; 
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .detail-content .game-desc {
      background: rgba(0, 0, 0, 0.3);
      padding: 16px 20px;
      border-radius: 20px;
      color: #c8d0e6;
      line-height: 1.7;
      margin: 0;
    }

    .detail-content .game-desc i {
      color: #f5b342;
      font-style: normal;
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
    }

    .detail-content .reason {
      background: rgba(245, 179, 66, 0.06);
      border-radius: 20px;
      padding: 16px 20px;
      color: #f0e3d0;
      border: 1px dashed rgba(245, 179, 66, 0.25);
      line-height: 1.7;
      margin: 0;
    }

    /* 🔍 ✨ 全螢幕燈箱樣式區 ✨ */
    .lightbox {
      display: none; /* 預設隱藏 */
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(6, 9, 17, 0.95);
      backdrop-filter: blur(10px);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.2s ease;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-content {
      max-width: 90%;
      max-height: 80vh;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      object-fit: contain; /* 確保全螢幕時圖片完整不被裁切 */
      border: 1px solid rgba(255, 215, 100, 0.2);
    }

    /* 燈箱控制按鈕 */
    .lightbox-btn {
      position: absolute;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      font-size: 1.5rem;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      user-select: none;
    }

    .lightbox-btn:hover {
      background: rgba(245, 179, 66, 0.8);
      border-color: #f5b342;
      transform: scale(1.1);
    }

    .lightbox-close { top: 24px; right: 24px; font-size: 1.2rem; }
    .lightbox-prev { left: 24px; }
    .lightbox-next { right: 24px; }

    /* 手機版自適應 */
    @media (max-width: 680px) {
      .detail-content {
        flex-direction: column;
      }
      .detail-media-zone, .detail-info-zone {
        flex: none;
        width: 100%;
      }
      .screenshots-grid {
        grid-template-columns: repeat(4, 1fr);
      }
      .lightbox-btn { width: 44px; height: 44px; font-size: 1.2rem; }
      .lightbox-prev { left: 10px; }
      .lightbox-next { right: 10px; }
    }

    .footer-note {
      margin-top: 20px;
      text-align: center;
      color: #5d6a8a;
      font-size: 0.8rem;
      border-top: 1px solid rgba(255, 215, 100, 0.08);
      padding-top: 16px;
    }
  </style>
</head>

      if (!game) return;
      
      detailTitle.innerHTML = ` ${game.name}`;
      
      // 建立這款遊戲在燈箱中可以播放的完整陣列（官圖在第 0 個，後面接個人截圖）
      activePlaylist = [game.image, ...(game.myScreenshots || [])];
      
      let screenshotsHTML = '';
      if (game.myScreenshots && game.myScreenshots.length > 0) {
        screenshotsHTML = `
          <div class="my-screenshots-title">📸 我的遊戲截圖 (點擊切換查看，點大圖可放大)</div>
          <div class="screenshots-grid">
            <img src="${game.image}" onclick="changeMainImage('${game.image}')" title="官方圖">
            ${game.myScreenshots.map(src => `<img src="${src}" onclick="changeMainImage('${src}')">`).join('')}
          </div>
        `;
      }

      detailContent.innerHTML = `
        <div class="detail-media-zone">
          <img src="${game.image}" class="game-image-main" id="mainDetailImg" alt="${game.name}" onclick="openLightbox()">
          ${screenshotsHTML}
        </div>

        <div class="detail-info-zone">
          <div class="game-desc">
            <i>📖 遊戲介紹</i>
            ${game.intro}
          </div>
          <div class="reason">
            <strong>💬 我的理由：</strong><br>
            ${game.reason}
          </div>
          <div style="color: #9aa3c2; font-size: 0.85rem; text-align: right; border-top: 1px solid rgba(255,215,100,0.1); padding-top: 12px; margin-top: 8px;">
            ✦ 點擊「回首頁」繼續探索 ✦
          </div>
        </div>
      `;
      
      // 初始化播放索引回到 0 (也就是目前的官圖)
      activePhotoIndex = 0;
    }

    // 提供點擊小圖切換大圖的功能
    function changeMainImage(src) {
      const mainImg = document.getElementById('mainDetailImg');
      if (mainImg) {
        mainImg.src = src;
        // 同時更新目前準備要全螢幕放大的圖片索引位置
        const idx = activePlaylist.indexOf(src);
        if (idx !== -1) activePhotoIndex = idx;
      }
    }

    // =============================================
    // 🔍 ✨ 燈箱控制邏輯 JavaScript ✨
    // =============================================
    function openLightbox() {
      if (activePlaylist.length === 0) return;
      lbImg.src = activePlaylist[activePhotoIndex];
      lightbox.classList.add('active');
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
    }

    function nextPhoto(e) {
      if(e) e.stopPropagation(); // 防止點按鈕觸發外層關閉
      activePhotoIndex = (activePhotoIndex + 1) % activePlaylist.length;
      lbImg.src = activePlaylist[activePhotoIndex];
    }

    function prevPhoto(e) {
      if(e) e.stopPropagation(); // 防止點按鈕觸發外層關閉
      activePhotoIndex = (activePhotoIndex - 1 + activePlaylist.length) % activePlaylist.length;
      lbImg.src = activePlaylist[activePhotoIndex];
    }

    // 綁定燈箱事件
    lbClose.addEventListener('click', closeLightbox);
    lbNext.addEventListener('click', nextPhoto);
    lbPrev.addEventListener('click', prevPhoto);
    lightbox.addEventListener('click', closeLightbox); // 點擊黑底任何地方關閉
    lbImg.addEventListener('click', (e) => e.stopPropagation()); // 點擊大圖本身不關閉

    // 支援鍵盤左右方向鍵與 ESC 鍵
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'ArrowRight') nextPhoto();
      if (e.key === 'ArrowLeft') prevPhoto();
      if (e.key === 'Escape') closeLightbox();
    });

    gameBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        const idx = parseInt(this.getAttribute('data-game'), 10);
        if (!isNaN(idx) && idx >= 0 && idx < games.length) {
          renderGameDetail(idx);
          showPage('page-detail');
        }
      });
    });

    backBtn.addEventListener('click', () => showPage('page-home'));
    showPage('page-home');
  </script>
</body>
</html>
